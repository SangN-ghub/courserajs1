<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip Main Content</a>

    <header>
        <h1>My Favorite Artists Gallery</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="VietnamArtist.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>

        </nav>
    </header>

    <main id="main-content">

            Hover over an image below to display here.

            <img class="preview" src="tlinh.jpg" alt="Tlinh music video" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
            <img class="preview" src="vpop.jpg" alt="Artist" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
            <img class="preview" src="stmtp.jpg" alt="Music festival" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
            <img class="preview" src="24k3.jpg" alt="24k Right" onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
        </div>
    </main>

    <script src="script.js"></script>
